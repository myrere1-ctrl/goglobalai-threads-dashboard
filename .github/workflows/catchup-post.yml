name: Catchup Post

# Trigger via external cron (cron-job.org) — GitHub's built-in schedule
# unreliable (throttled 1-2h vs requested 15min). External cron guarantees
# 15-min ticks. Ref: cron-job.org job "GoGlobal Threads Catchup".
on:
  workflow_dispatch:

# Hindari race condition: cuma 1 catchup jalan bersamaan
concurrency:
  group: catchup-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  catchup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest log (avoid stale state)
        run: git pull --rebase

      - name: Catchup post if needed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: node scripts/catchup-post.mjs

      - name: Commit posted log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted-log.json
          if git diff --staged --quiet; then
            echo "No new posts (nothing to commit)"
          else
            git commit -m "log: catchup post"
            git pull --rebase
            git push
          fi
